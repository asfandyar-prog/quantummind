<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <rect width="32" height="32" rx="8" fill="#050810"/>
  <!-- Atom nucleus -->
  <circle cx="16" cy="16" r="3" fill="#76e4f7"/>
  <!-- Electron ring 1 -->
  <ellipse cx="16" cy="16" rx="12" ry="5" fill="none" stroke="#63b3ed" stroke-width="1.2" opacity="0.8"/>
  <!-- Electron ring 2 (rotated 60deg) -->
  <ellipse cx="16" cy="16" rx="12" ry="5" fill="none" stroke="#63b3ed" stroke-width="1.2" opacity="0.8"
    transform="rotate(60 16 16)"/>
  <!-- Electron ring 3 (rotated 120deg) -->
  <ellipse cx="16" cy="16" rx="12" ry="5" fill="none" stroke="#63b3ed" stroke-width="1.2" opacity="0.8"
    transform="rotate(120 16 16)"/>
</svg>